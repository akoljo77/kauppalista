<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}
input{
  width:70%;
  padding:12px;
  font-size:18px;
}
button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}
.deleteBtn{
  margin-left:6px;
  background:#888;
}
.clearBtn{
  background:#d9534f;
}
li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
#suggestions{
  background:white;
  border-radius:6px;
  margin-top:4px;
  max-height:150px;
  overflow:auto;
}
.suggestion{
  padding:10px;
  font-size:18px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.suggestion:hover{background:#e8f0fe;}

#buttons{display:flex; flex-wrap:wrap;}
.letterGroup{margin:4px;}
.letterHeader{
  background:white;
  color:black;
  font-weight:bold;
  width:70px;
  height:50px;
  font-size:22px;
  border:2px solid #4CAF50;
  border-radius:8px;
}
.itemRow{display:block; margin:6px 0;}
.itemBtn{
  display:inline-block;
  background:white;
  color:black;
  font-size:20px;
  padding:10px 14px;
  border:2px solid #2196F3;
  border-radius:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="input" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<div id="suggestions"></div>
<div id="buttons"></div>

<h3>Ostettavat</h3>
<button id="clearBtn" class="clearBtn">Tyhjennä lista</button>
<ul id="list"></ul>

<!-- ✅ KOKO SOVELLUS + FIREBASE -->
<script type="module">

/* -------------------------------
   ✅ 1. FIREBASE ALUSTUS
------------------------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

// ✅ sinun Firestore-config
const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1",
  storageBucket: "kauppalista-360b1.firebasestorage.app",
  messagingSenderId: "531600533067",
  appId: "1:531600533067:web:036c40e5fdebeeca110fce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* -------------------------------
   ✅ 2. DATA-MUUTTUJAT
------------------------------- */
let items = [];
let buttons = [];
let dragIndex;
let openContent = null;


/* -------------------------------
   ✅ 3. PIKAPAINIKKEET FIRESTORESTA
------------------------------- */
onSnapshot(collection(db, "pikapainikkeet"), (snapshot) => {
  buttons = snapshot.docs.map(d => d.data().nimi);
  renderButtons();
});


/* -------------------------------
   ✅ 4. OSTOSLISTA FIRESTORESTA
------------------------------- */
onSnapshot(collection(db, "kauppalista"), (snapshot) => {
  items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
});


/* -------------------------------
   ✅ 5. RENDERÖINTI – PIKAPAINIKKEET
------------------------------- */
function renderButtons(){
  let box = document.getElementById("buttons");
  box.innerHTML = "";
  let groups = {};

  buttons.forEach(name=>{
    let letter = name.charAt(0).toUpperCase();
    if(!groups[letter]) groups[letter] = [];
    groups[letter].push(name);
  });

  Object.keys(groups).sort().forEach(letter=>{
    let groupDiv = document.createElement("div");
    groupDiv.className = "letterGroup";

    let header = document.createElement("button");
    header.innerText = letter;
    header.className = "letterHeader";

    let content = document.createElement("div");
    content.className = "hidden";

    header.onclick = ()=>{
      if(openContent && openContent !== content){
        openContent.classList.add("hidden");
      }
      content.classList.toggle("hidden");
      openContent = content.classList.contains("hidden") ? null : content;
    };

    groups[letter].sort((a,b)=>a.localeCompare(b));
    groups[letter].forEach(name=>{
      let row = document.createElement("div");
      row.className = "itemRow";

      let b = document.createElement("button");
      b.innerText = name;
      b.className = "itemBtn";
      b.onclick = ()=>addItemFromButton(name);

      row.appendChild(b);
      content.appendChild(row);
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(content);
    box.appendChild(groupDiv);
  });
}


/* -------------------------------
   ✅ 6. RENDERÖINTI – OSTOSLISTA
------------------------------- */
function renderList(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, index)=>{
    let li = document.createElement("li");
    li.draggable = true;

    let text = document.createElement("span");
    text.innerText = item.nimi;

    let remove = document.createElement("button");
    remove.innerText = "✓";
    remove.onclick = ()=>removeItem(index);

    li.appendChild(text);
    li.appendChild(remove);

    list.appendChild(li);
  });
}


/* -------------------------------
   ✅ 7. FIRESTORE – LISÄYS
------------------------------- */
window.addItem = async function () {
  const input = document.getElementById("input");
  const value = input.value.trim();
  if (!value) return;

  await addDoc(collection(db, "kauppalista"), { nimi: value });
  input.value = "";
};

window.addItemFromButton = async function (name) {
  await addDoc(collection(db, "kauppalista"), { nimi: name });
};


/* -------------------------------
   ✅ 8. FIRESTORE – POISTO
------------------------------- */
window.removeItem = async function (index) {
  const item = items[index];
  await deleteDoc(doc(db, "kauppalista", item.id));
};


/* -------------------------------
   ✅ 9. FIRESTORE – TYHJENNYS
------------------------------- */
document.getElementById("clearBtn").onclick = async () => {
  if (!confirm("Tyhjennetäänkö koko lista?")) return;

  const snap = await getDocs(collection(db, "kauppalista"));
  snap.forEach(d => deleteDoc(doc(db, "kauppalista", d.id)));
};

</script>

</body>
</html>
