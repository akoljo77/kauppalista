<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}
input{
  width:70%;
  padding:12px;
  font-size:18px;
}
button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}
.clearBtn{ background:#d9534f; }

li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}

#suggestions{
  background:white;
  border-radius:6px;
  margin-top:4px;
  max-height:150px;
  overflow:auto;
}
.suggestion{
  padding:10px;
  font-size:18px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.suggestion:hover{ background:#e8f0fe; }

#buttons{display:flex; flex-wrap:wrap;}
.letterGroup{margin:4px;}
.letterHeader{
  background:white;
  color:black;
  font-weight:bold;
  width:70px;
  height:50px;
  font-size:22px;
  border:2px solid #4CAF50;
  border-radius:8px;
}
.itemRow{display:block; margin:6px 0;}
.itemBtn{
  display:inline-block;
  background:white;
  color:black;
  font-size:20px;
  padding:10px 14px;
  border:2px solid #2196F3;
  border-radius:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="input" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<div id="suggestions"></div>
<div id="buttons"></div>

<h3>Ostettavat</h3>
<button id="clearBtn" class="clearBtn">Tyhjennä lista</button>
<ul id="list"></ul>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc,
  deleteDoc, doc, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1",
  storageBucket: "kauppalista-360b1.firebasestorage.app",
  messagingSenderId: "531600533067",
  appId: "1:531600533067:web:036c40e5fdebeeca110fce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */
let items = [];
let buttons = [];
let openContent = null;

/* SNAPSHOT — PIKAPAINIKKEET */
onSnapshot(collection(db, "pikapainikkeet"), (snapshot) => {
  buttons = snapshot.docs.map(d => d.data().nimi);
  renderButtons();
});

/* SNAPSHOT — OSTOSLISTA (nyt säilytetään order!) */
onSnapshot(collection(db, "kauppalista"), (snapshot) => {

  items = snapshot.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  // ✅ Säilytä käyttäjän järjestys order-kentän perusteella
  items.sort((a,b)=> (a.order ?? 0) - (b.order ?? 0));

  renderList();
});

/* ENTER = Lisää */
document.getElementById("input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    addItem();
  }
});

/* RENDER BUTTON GROUPS AAKKOSILLA */
function renderButtons(){
  let box = document.getElementById("buttons");
  box.innerHTML = "";
  let groups = {};

  buttons.forEach(name=>{
    let letter = name.charAt(0).toUpperCase();
    if(!groups[letter]) groups[letter] = [];
    groups[letter].push(name);
  });

  Object.keys(groups).sort().forEach(letter=>{
    let groupDiv = document.createElement("div");

    let header = document.createElement("button");
    header.innerText = letter;
    header.className = "letterHeader";

    let content = document.createElement("div");
    content.className = "hidden";

    header.onclick = ()=>{
      if(openContent && openContent !== content){
        openContent.classList.add("hidden");
      }
      content.classList.toggle("hidden");
      openContent = content.classList.contains("hidden") ? null : content;
    };

    groups[letter].sort((a,b)=>a.localeCompare(b));

    groups[letter].forEach(name=>{
      let row = document.createElement("div");
      row.className = "itemRow";

      let b = document.createElement("button");
      b.innerText = name;
      b.className = "itemBtn";
      b.onclick = ()=>addItemFromButton(name);

      row.appendChild(b);
      content.appendChild(row);
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(content);
    box.appendChild(groupDiv);
  });
}

/* HAKUEHDOTUKSET */
document.getElementById("input").addEventListener("input", ()=>{
  let text = document.getElementById("input").value.trim().toLowerCase();
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  if(text.length < 3) return;

  let matches = buttons.filter(b => 
    b.toLowerCase().startsWith(text)
  );

  matches.forEach(m=>{
    let div = document.createElement("div");
    div.className = "suggestion";
    div.innerText = m;
    div.onclick = ()=>{
      document.getElementById("input").value = m;
      box.innerHTML = "";
    };
    box.appendChild(div);
  });
});

/* RENDER LISTA (EI AAKKOSJÄRJESTYSTÄ!) */
function renderList(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, index)=>{
    let li = document.createElement("li");
    li.draggable = true;

    let text = document.createElement("span");
    text.innerText = item.nimi;

    let remove = document.createElement("button");
    remove.innerText = "🗑️";
    remove.onclick = ()=>removeItem(index);

    li.appendChild(text);
    li.appendChild(remove);

    /* DRAG AND DROP JÄRJESTYKSEN TALLENNUS */
    li.addEventListener("dragstart", ()=> li.classList.add("dragging"));
    li.addEventListener("dragend", ()=> li.classList.remove("dragging"));
    li.addEventListener("dragover", e=>{
      e.preventDefault();
      let dragging = document.querySelector(".dragging");
      if (dragging && dragging !== li) {
        list.insertBefore(dragging, li);
      }
    });
    li.addEventListener("drop", async ()=>{
      let newOrder = [...document.querySelectorAll("#list li")].map((el,i)=>{
        return { id: items[i].id, order: i };
      });
      for (let o of newOrder) {
        await updateDoc(doc(db,"kauppalista",o.id), { order:o.order });
      }
    });

    list.appendChild(li);
  });
}

/* ✅ LISÄÄ TUOTE */
window.addItem = async function () {
  const input = document.getElementById("input");
  const value = input.value.trim();
  if (!value) return;

  // Estä duplikaatit ostoslistassa
  const exists = items.some(i => 
    i.nimi.toLowerCase() === value.toLowerCase()
  );
  if (exists) {
    alert("Tuote on jo listalla!");
    input.value = "";
    return;
  }

  // Lisää listaan → order = listan loppuun
  await addDoc(collection(db, "kauppalista"), { 
    nimi: value,
    order: items.length
  });

  // Lisää pikapainike tarvittaessa
  const existsBtn = buttons.map(b => b.toLowerCase())
                           .includes(value.toLowerCase());
  if (!existsBtn) {
    await addDoc(collection(db, "pikapainikkeet"), { nimi: value });
  }

  input.value = "";
  document.getElementById("suggestions").innerHTML = "";
};

/* ✅ LISÄYS PIKAPAINIKKEESTA */
window.addItemFromButton = async function (name) {

  // Estä duplikaatti myös täällä
  const exists = items.some(i =>
    i.nimi.toLowerCase() === name.toLowerCase()
  );
  if (exists) {
    alert("Tuote on jo listalla!");
    document.getElementById("input").value = "";
    return;
  }

  await addDoc(collection(db,"kauppalista"), { 
    nimi:name,
    order: items.length
  });
};

/* ✅ POISTA */
window.removeItem = async function (index) {
  const item = items[index];
  await deleteDoc(doc(db, "kauppalista", item.id));
};

/* ✅ TYHJENNÄ */
document.getElementById("clearBtn").onclick = async () => {
  if (!confirm("Tyhjennetäänkö koko lista?")) return;
  const snap = await getDocs(collection(db, "kauppalista"));
  snap.forEach(d => deleteDoc(doc(db, "kauppalista", d.id)));
};

</script>

</body>
</html>
