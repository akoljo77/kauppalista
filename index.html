<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}
input{
  width:70%;
  padding:12px;
  font-size:18px;
}
button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}
.clearBtn{ background:#d9534f; }

li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}

#suggestions{
  background:white;
  border-radius:6px;
  margin-top:4px;
  max-height:150px;
  overflow:auto;
}
.suggestion{
  padding:10px;
  font-size:18px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.suggestion:hover{ background:#e8f0fe; }

#buttons{display:flex; flex-wrap:wrap;}
.letterGroup{margin:4px;}
.letterHeader{
  background:white;
  color:black;
  font-weight:bold;
  width:70px;
  height:50px;
  font-size:22px;
  border:2px solid #4CAF50;
  border-radius:8px;
}
.itemRow{margin:6px 0;}
.itemBtn{
  background:white;
  color:black;
  font-size:20px;
  padding:10px 14px;
  border:2px solid #2196F3;
  border-radius:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="input" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<div id="suggestions"></div>
<div id="buttons"></div>

<h3>Ostettavat</h3>
<button id="clearBtn" class="clearBtn">Tyhjennä lista</button>
<ul id="list"></ul>

<script type="module">

/* --- FIREBASE --- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc,
  deleteDoc, doc, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1",
  storageBucket: "kauppalista-360b1.firebasestorage.app",
  messagingSenderId: "531600533067",
  appId: "1:531600533067:web:036c40e5fdebeeca110fce"
};

initializeApp(firebaseConfig);
const db = getFirestore();

/* DATA */
let items = [];
let buttons = [];
let openContent = null;

/* --- SNAPSHOT: pikapainikkeet --- */
onSnapshot(collection(db, "pikapainikkeet"), (snap)=>{
  buttons = snap.docs.map(d=>d.data().nimi);
  renderButtons();
});

/* --- SNAPSHOT: ostoslista order-järjestyksessä --- */
onSnapshot(collection(db, "kauppalista"), (snap)=>{
  items = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  items.sort((a,b)=>(a.order??0)-(b.order??0));
  renderList();
});

/* --- ENTER lisää --- */
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key === "Enter") addItem();
});

/* --- RENDER: pikapainikkeet --- */
function renderButtons(){
  let box = document.getElementById("buttons");
  box.innerHTML = "";
  let groups = {};

  buttons.forEach(name=>{
    const L = name.charAt(0).toUpperCase();
    if(!groups[L]) groups[L]=[];
    groups[L].push(name);
  });

  Object.keys(groups).sort().forEach(letter=>{
    let div = document.createElement("div");
    div.className = "letterGroup";

    let header = document.createElement("button");
    header.className="letterHeader";
    header.innerText = letter;

    let content = document.createElement("div");
    content.className="hidden contentArea"; // helpompi löytää myöhemmin

    header.onclick = ()=>{
      if(openContent && openContent!==content){
        openContent.classList.add("hidden");
      }
      content.classList.toggle("hidden");
      openContent = content.classList.contains("hidden") ? null : content;
    };

    groups[letter].sort((a,b)=>a.localeCompare(b));
    groups[letter].forEach(name=>{
      let row=document.createElement("div");
      row.className="itemRow";

      let b=document.createElement("button");
      b.className="itemBtn";
      b.innerText=name;
      b.onclick=()=>addItemFromButton(name, content);

      row.appendChild(b);
      content.appendChild(row);
    });

    div.appendChild(header);
    div.appendChild(content);
    box.appendChild(div);
  });
}

/* --- HAKUEHDOTUKSET --- */
document.getElementById("input").addEventListener("input", ()=>{
  let val = input.value.trim().toLowerCase();
  let box = document.getElementById("suggestions");
  box.innerHTML="";

  if(val.length<3) return;

  let hits = buttons.filter(b=>b.toLowerCase().startsWith(val));
  hits.forEach(m=>{
    let d=document.createElement("div");
    d.className="suggestion";
    d.innerText=m;
    d.onclick=()=>{ input.value=m; box.innerHTML=""; };
    box.appendChild(d);
  });
});

/* --- RENDER: ostoslista (ei aakkosittain!) --- */
function renderList(){
  let list=document.getElementById("list");
  list.innerHTML="";

  items.forEach((item,i)=>{
    let li=document.createElement("li");
    li.draggable=true;

    let t=document.createElement("span");
    t.innerText=item.nimi;

    let del=document.createElement("button");
    del.innerText="🗑️";
    del.onclick=()=>removeItem(i);

    li.appendChild(t);
    li.appendChild(del);

    /* Drag-start */
    li.addEventListener("dragstart", ()=>{
      li.classList.add("dragging");
    });

    li.addEventListener("dragend", ()=>{
      li.classList.remove("dragging");
    });

    /* reorder in UI */
    li.addEventListener("dragover", e=>{
      e.preventDefault();
      const dragging=document.querySelector(".dragging");
      if(dragging && dragging!==li){
        list.insertBefore(dragging, li);
      }
    });

    li.addEventListener("drop", async ()=>{
      const elements=[...document.querySelectorAll("#list li")];
      for(let idx=0; idx<elements.length; idx++){
        const id = items.find(x=>x.nimi===elements[idx].innerText).id;
        await updateDoc(doc(db,"kauppalista",id),{order:idx});
      }
    });

    list.appendChild(li);
  });
}

/* --- LISÄÄ TUOTE TEKSTIKENTÄSTÄ --- */
window.addItem = async function(){
  let input=document.getElementById("input");
  let value=input.value.trim();
  if(!value) return;

  /* Duplikaattiesto */
  if(items.some(x=>x.nimi.toLowerCase()===value.toLowerCase())){
    alert("Tuote on jo listalla!");
    input.value="";
    return;
  }

  /* Lisää listaan aina viimeiseksi */
  await addDoc(collection(db,"kauppalista"),{
    nimi:value,
    order: items.length
  });

  /* Lisää pikapainike jos puuttuu */
  if(!buttons.map(b=>b.toLowerCase()).includes(value.toLowerCase())){
    await addDoc(collection(db,"pikapainikkeet"),{nimi:value});
  }

  input.value="";
  document.getElementById("suggestions").innerHTML="";
};

/* --- LISÄÄ TUOTE PIKAPAINIKKEESTA --- */
window.addItemFromButton = async function(name, contentDiv){

  /* duplikaattiesto */
  if(items.some(x=>x.nimi.toLowerCase()===name.toLowerCase())){
    alert("Tuote on jo listalla!");
    input.value="";
    return;
  }

  /* Lisää listaan aina viimeiseksi */
  await addDoc(collection(db,"kauppalista"),{
    nimi:name,
    order: items.length
  });

  /* ✅ Sulje juuri painetun kirjaimen valikko */
  if(contentDiv){
    contentDiv.classList.add("hidden");
    openContent=null;
  }
};

/* --- POISTA TUOTE --- */
window.removeItem = async function(i){
  await deleteDoc(doc(db,"kauppalista",items[i].id));
};

/* --- TYHJENNÄ KOKO LISTA --- */
document.getElementById("clearBtn").onclick = async ()=>{
  if(!confirm("Tyhjennetäänkö koko lista?")) return;
  const snap=await getDocs(collection(db,"kauppalista"));
  snap.forEach(d=>deleteDoc(doc(db,"kauppalista",d.id)));
};

</script>

</body>
</html>
