<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}
input{
  width:70%;
  padding:12px;
  font-size:18px;
}
button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}
.clearBtn{
  background:#d9534f;
}
li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="item" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<h3>Ostettavat</h3>
<button id="clearBtn" class="clearBtn">Tyhjennä lista</button>

<ul id="list"></ul>

<!-- ✅ FIREBASE + APP LOGIC -->
<script type="module">

/* --- Firebase importit --- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

/* --- Firebase config --- */
const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1",
  storageBucket: "kauppalista-360b1.firebasestorage.app",
  messagingSenderId: "531600533067",
  appId: "1:531600533067:web:036c40e5fdebeeca110fce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* --- Reaaliaikainen kuuntelu Firestoresta --- */
onSnapshot(collection(db, "kauppalista"), (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(docu => {
    const li = document.createElement("li");
    li.textContent = docu.data().nimi;

    const del = document.createElement("button");
    del.textContent = "✓";
    del.onclick = () => deleteDoc(doc(db, "kauppalista", docu.id));

    li.appendChild(del);
    list.appendChild(li);
  });
});

/* --- Lisää tuote Firestoreen --- */
async function addItem() {
  const input = document.getElementById("item");
  const value = input.value.trim();
  if (value === "") return;

  await addDoc(collection(db, "kauppalista"), { nimi: value });
  input.value = "";
}

window.addItem = addItem;

/* --- Tyhjennä lista --- */
document.getElementById("clearBtn").onclick = async () => {
  if (!confirm("Tyhjennetäänkö koko lista?")) return;

  const snap = await onSnapshot(collection(db, "kauppalista"), () => {});
  snap.docs.forEach(docu => {
    deleteDoc(doc(db, "kauppalista", docu.id));
  });
};

</script>
</body>
</html>
