<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}

input{
  width:70%;
  padding:12px;
  font-size:18px;
}

button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}

.clearBtn{ background:#d9534f; }

li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  cursor:grab;
}

.dragging{
  opacity:0.5;
}

#suggestions{
  background:white;
  border-radius:6px;
  margin-top:4px;
  max-height:150px;
  overflow:auto;
}

.suggestion{
  padding:10px;
  cursor:pointer;
}

.suggestion:hover{ background:#eee; }

#buttons{display:flex; flex-wrap:wrap;}

.itemBtn{
  margin:4px;
  background:white;
  color:black;
  border:2px solid #2196F3;
}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="input" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<div id="suggestions"></div>
<div id="buttons"></div>

<h3>Ostettavat (raahaa järjestykseen)</h3>
<button class="clearBtn" onclick="clearAll()">Tyhjennä</button>

<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, getDocs, updateDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let items = [];
let buttons = [];

/* 🔥 DATA */
onSnapshot(collection(db, "kauppalista"), (snap)=>{
  items = snap.docs.map(d=>({id:d.id,...d.data()}));

  // Järjestys kentän mukaan
  items.sort((a,b)=>a.order - b.order);

  renderList();
});

onSnapshot(collection(db, "pikapainikkeet"), (snap)=>{
  buttons = snap.docs.map(d=>d.data().nimi);
  renderButtons();
});

/* 🔥 LISÄÄ */
window.addItem = async ()=>{
  const input = document.getElementById("input");
  const value = input.value.trim();
  if(!value) return;

  // ❌ estä tuplat
  if(items.some(i=>i.nimi.toLowerCase()===value.toLowerCase())){
    alert("On jo listalla");
    return;
  }

  const order = items.length;

  await addDoc(collection(db,"kauppalista"),{
    nimi:value,
    order:order
  });

  if(!buttons.map(b=>b.toLowerCase()).includes(value.toLowerCase())){
    await addDoc(collection(db,"pikapainikkeet"),{nimi:value});
  }

  input.value="";
};

/* 🔥 PIKAPAINIKE LISÄYS */
window.addItemFromButton = async (name)=>{

  // ❌ estä tuplat myös täällä
  if(items.some(i=>i.nimi.toLowerCase()===name.toLowerCase())){
    alert("On jo listalla");
    return;
  }

  const order = items.length;

  await addDoc(collection(db,"kauppalista"),{
    nimi:name,
    order:order
  });
};

/* 🔥 POISTA */
window.removeItem = async (id)=>{
  await deleteDoc(doc(db,"kauppalista",id));
};

/* 🔥 TYHJENNÄ */
window.clearAll = async ()=>{
  if(!confirm("Tyhjennetäänkö lista?")) return;
  const snap = await getDocs(collection(db,"kauppalista"));
  snap.forEach(d=>deleteDoc(doc(db,"kauppalista",d.id)));
};

/* 🔥 RENDER */
function renderList(){
  const list = document.getElementById("list");
  list.innerHTML="";

  items.forEach(item=>{
    const li = document.createElement("li");
    li.draggable=true;
    li.dataset.id=item.id;

    li.innerHTML = `
      <span>${item.nimi}</span>
      <button onclick="removeItem('${item.id}')">🗑️</button>
    `;

    list.appendChild(li);
  });

  addDragEvents();
}

/* 🔥 DRAG & DROP */
function addDragEvents(){
  const list = document.getElementById("list");
  let dragging;

  list.querySelectorAll("li").forEach(li=>{
    li.addEventListener("dragstart", ()=>{
      dragging = li;
      li.classList.add("dragging");
    });

    li.addEventListener("dragend", async ()=>{
      li.classList.remove("dragging");

      // päivitä järjestys firebaseen
      const newOrder = [...list.children];
      for(let i=0;i<newOrder.length;i++){
        const id = newOrder[i].dataset.id;
        await updateDoc(doc(db,"kauppalista",id),{
          order:i
        });
      }
    });
  });

  list.addEventListener("dragover", e=>{
    e.preventDefault();
    const after = getDragAfterElement(list, e.clientY);
    if(after==null){
      list.appendChild(dragging);
    } else {
      list.insertBefore(dragging, after);
    }
  });
}

function getDragAfterElement(container, y){
  const els = [...container.querySelectorAll("li:not(.dragging)")];

  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;

    if(offset < 0 && offset > closest.offset){
      return {offset:offset, element:child};
    } else {
      return closest;
    }
  }, {offset:Number.NEGATIVE_INFINITY}).element;
}

/* 🔥 PIKAPAINIKKEET */
function renderButtons(){
  const box = document.getElementById("buttons");
  box.innerHTML="";

  buttons.sort((a,b)=>a.localeCompare(b));

  buttons.forEach(name=>{
    const b = document.createElement("button");
    b.innerText=name;
    b.className="itemBtn";
    b.onclick=()=>addItemFromButton(name);
    box.appendChild(b);
  });
}

/* 🔥 ENTER */
document.getElementById("input").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") addItem();
});

/* 🔥 EHDOTUKSET */
document.getElementById("input").addEventListener("input",()=>{
  const text = document.getElementById("input").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML="";

  if(text.length<3) return;

  buttons
    .filter(b=>b.toLowerCase().startsWith(text))
    .forEach(m=>{
      const div = document.createElement("div");
      div.className="suggestion";
      div.innerText=m;
      div.onclick=()=>{
        document.getElementById("input").value=m;
        box.innerHTML="";
      };
      box.appendChild(div);
    });
});

</script>

</body>
</html>
