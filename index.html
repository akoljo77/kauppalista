<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kauppalista</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:20px;
  background:#f2f2f2;
}
h1{text-align:center;}

input{
  width:70%;
  padding:12px;
  font-size:18px;
}

button{
  padding:10px;
  margin:4px;
  font-size:16px;
  border-radius:6px;
  border:none;
  background:#2196F3;
  color:white;
}

.clearBtn{ background:#d9534f; }

li{
  background:white;
  margin-top:8px;
  padding:14px;
  font-size:20px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.iconBtn{
  background:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

.icon{
  width:20px;
  height:20px;
  stroke:#2196F3;
  stroke-width:3;
  fill:none;
}

#suggestions{
  background:white;
  border-radius:6px;
  margin-top:4px;
  max-height:150px;
  overflow:auto;
}
.suggestion{
  padding:10px;
  font-size:18px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.suggestion:hover{ background:#e8f0fe; }

#buttons{display:flex; flex-wrap:wrap;}
.letterGroup{margin:4px;}
.letterHeader{
  background:white;
  color:black;
  font-weight:bold;
  width:70px;
  height:50px;
  font-size:22px;
  border:2px solid #4CAF50;
  border-radius:8px;
}
.itemRow{
  margin:6px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.itemBtn{
  background:white;
  color:black;
  font-size:20px;
  padding:10px 14px;
  border:2px solid #2196F3;
  border-radius:10px;
}
.hidden{display:none;}
.dragging{opacity:0.5;}
</style>
</head>

<body>

<h1>Kauppalista</h1>

<input id="input" placeholder="Lisää tuote">
<button onclick="addItem()">Lisää</button>

<div id="suggestions"></div>
<div id="buttons"></div>

<h3>Ostettavat</h3>
<button id="clearBtn" class="clearBtn">Tyhjennä lista</button>
<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc,
  deleteDoc, doc, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfXI1zwoyvcaV4HvqBBgqQQODNygiqckQ",
  authDomain: "kauppalista-360b1.firebaseapp.com",
  projectId: "kauppalista-360b1"
};

initializeApp(firebaseConfig);
const db = getFirestore();

let items = [];
let buttons = [];
let openContent = null;

/* 🔵 SININEN RASTI */
function crossIcon(){
  return `
  <svg class="icon" viewBox="0 0 24 24">
    <line x1="5" y1="5" x2="19" y2="19"/>
    <line x1="19" y1="5" x2="5" y2="19"/>
  </svg>`;
}

/* --- SNAPSHOT --- */
onSnapshot(collection(db,"pikapainikkeet"), snap=>{
  buttons = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderButtons();
});

onSnapshot(collection(db,"kauppalista"), snap=>{
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  items.sort((a,b)=>(a.order??0)-(b.order??0));
  renderList();
});

/* --- ENTER --- */
input.addEventListener("keypress", e=>{
  if(e.key==="Enter") addItem();
});

/* --- PIKAPAINIKKEET --- */
function renderButtons(){
  let box=document.getElementById("buttons");
  box.innerHTML="";
  let groups={};

  buttons.forEach(b=>{
    let L=b.nimi.charAt(0).toUpperCase();
    if(!groups[L]) groups[L]=[];
    groups[L].push(b);
  });

  Object.keys(groups).sort().forEach(letter=>{
    let div=document.createElement("div");
    div.className="letterGroup";

    let header=document.createElement("button");
    header.className="letterHeader";
    header.innerText=letter;

    let content=document.createElement("div");
    content.className="hidden";

    header.onclick=()=>{
      if(openContent && openContent!==content){
        openContent.classList.add("hidden");
      }
      content.classList.toggle("hidden");
      openContent=content.classList.contains("hidden")?null:content;
    };

    groups[letter].sort((a,b)=>a.nimi.localeCompare(b.nimi));

    groups[letter].forEach(obj=>{
      let row=document.createElement("div");
      row.className="itemRow";

      let btn=document.createElement("button");
      btn.className="itemBtn";
      btn.innerText=obj.nimi;
      btn.onclick=()=>addItemFromButton(obj.nimi, content);

      let del=document.createElement("button");
      del.className="iconBtn";
      del.innerHTML=crossIcon();
      del.onclick=()=>deleteQuickButton(obj.id);

      row.appendChild(btn);
      row.appendChild(del);
      content.appendChild(row);
    });

    div.appendChild(header);
    div.appendChild(content);
    box.appendChild(div);
  });
}

/* --- DRAG --- */
function addDragEvents(){
  const list=document.getElementById("list");
  let dragging=null;

  list.querySelectorAll("li").forEach(li=>{
    li.addEventListener("dragstart", ()=>{
      dragging=li;
      li.classList.add("dragging");
    });

    li.addEventListener("dragend", async ()=>{
      li.classList.remove("dragging");

      const newOrder=[...list.children];
      for(let i=0;i<newOrder.length;i++){
        const id=newOrder[i].dataset.id;
        await updateDoc(doc(db,"kauppalista",id),{order:i});
      }
    });
  });

  list.addEventListener("dragover", e=>{
    e.preventDefault();
    const after=getDragAfterElement(list,e.clientY);
    if(after==null){
      list.appendChild(dragging);
    } else {
      list.insertBefore(dragging,after);
    }
  });
}

function getDragAfterElement(container,y){
  const els=[...container.querySelectorAll("li:not(.dragging)")];

  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;

    if(offset<0 && offset>closest.offset){
      return {offset:offset, element:child};
    } else {
      return closest;
    }
  },{offset:Number.NEGATIVE_INFINITY}).element;
}

/* --- RENDER LISTA --- */
function renderList(){
  let list=document.getElementById("list");
  list.innerHTML="";

  items.forEach(item=>{
    let li=document.createElement("li");
    li.draggable=true;
    li.dataset.id=item.id;

    let span=document.createElement("span");
    span.innerText=item.nimi;

    let del=document.createElement("button");
    del.className="iconBtn";
    del.innerHTML=crossIcon();
    del.onclick=()=>deleteDoc(doc(db,"kauppalista",item.id));

    li.appendChild(span);
    li.appendChild(del);
    list.appendChild(li);
  });

  addDragEvents();
}

/* --- LISÄÄ --- */
window.addItem = async ()=>{
  let value=input.value.trim();
  if(!value) return;

  if(items.some(x=>x.nimi.toLowerCase()===value.toLowerCase())){
    alert("Tuote on jo listalla!");
    input.value=""; // 🔥 tyhjennys lisätty
    return;
  }

  await addDoc(collection(db,"kauppalista"),{
    nimi:value,
    order:items.length
  });

  if(!buttons.map(b=>b.nimi.toLowerCase()).includes(value.toLowerCase())){
    await addDoc(collection(db,"pikapainikkeet"),{nimi:value});
  }

  input.value="";
};

/* --- PIKAPAINIKE LISÄYS --- */
window.addItemFromButton = async (name, contentDiv)=>{
  if(items.some(x=>x.nimi.toLowerCase()===name.toLowerCase())){
    alert("Tuote on jo listalla!");
    input.value=""; // 🔥 tyhjennys myös täällä
    return;
  }

  await addDoc(collection(db,"kauppalista"),{
    nimi:name,
    order:items.length
  });

  if(contentDiv){
    contentDiv.classList.add("hidden");
    openContent=null;
  }
};

/* --- POISTA PIKAPAINIKE --- */
window.deleteQuickButton = async (id)=>{
  await deleteDoc(doc(db,"pikapainikkeet",id));
};

/* --- TYHJENNÄ --- */
clearBtn.onclick=async ()=>{
  if(!confirm("Tyhjennetäänkö lista?")) return;
  const snap=await getDocs(collection(db,"kauppalista"));
  snap.forEach(d=>deleteDoc(doc(db,"kauppalista",d.id)));
};

/* --- HAKU --- */
input.addEventListener("input",()=>{
  let val=input.value.toLowerCase();
  let box=document.getElementById("suggestions");
  box.innerHTML="";

  if(val.length<3) return;

  buttons
    .filter(b=>b.nimi.toLowerCase().startsWith(val))
    .forEach(m=>{
      let d=document.createElement("div");
      d.className="suggestion";
      d.innerText=m.nimi;
      d.onclick=()=>{ input.value=m.nimi; box.innerHTML=""; };
      box.appendChild(d);
    });
});

</script>

</body>
</html>
